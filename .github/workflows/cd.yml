name: Poulina SSO — CD

on:
  workflow_run:
    workflows: ["Poulina SSO — CI"]
    branches: [ main, develop ]
    types: [ completed ]

env:
  REGISTRY: docker.io # Change registry to Docker Hub
  IMAGE_NAME: ${{ vars.DOCKER_USERNAME }}/poulina-sso-api

jobs:
  docker-build-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    permissions:
      contents: read
      # packages: write # No longer needed for Docker Hub

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          # registry: ${{ env.REGISTRY }} # 'docker.io' is the default, so this line is optional
          username: ${{ vars.DOCKER_USERNAME }} # Use the variable for username
          password: ${{ secrets.DOCKERHUB_TOKEN }} # Use the secret for token [citation:6][citation:7]

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./API/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}